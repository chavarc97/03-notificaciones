name: Docker Build and Publish to ECR

on:
  push:
    branches: [ "main", "master" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: notificaciones

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      env:
        AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_KEY,AWS_SECRET,AWS_TOKEN,AWS_ACCOUNT_ID,SNS_TOPIC_ARN
        script: |
          export AWS_ACCESS_KEY_ID="$AWS_KEY"
          export AWS_SECRET_ACCESS_KEY="$AWS_SECRET"
          export AWS_SESSION_TOKEN="$AWS_TOKEN"
          export ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com"
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin $ECR_REGISTRY
          docker pull $ECR_REGISTRY/notificaciones:latest
          docker network create examen-net 2>/dev/null || true
          docker stop notificaciones 2>/dev/null || true
          docker rm notificaciones 2>/dev/null || true
          docker run -d \
            --name notificaciones \
            --network examen-net \
            -p 8002:8000 \
            -e SNS_TOPIC_ARN="$SNS_TOPIC_ARN" \
            -e AWS_REGION=us-east-1 \
            -e AWS_ACCESS_KEY_ID="$AWS_KEY" \
            -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET" \
            -e AWS_SESSION_TOKEN="$AWS_TOKEN" \
            --restart unless-stopped \
            $ECR_REGISTRY/notificaciones:latest
